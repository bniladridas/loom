name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build --if-present

      - name: Bump Version
        id: bump
        run: |
          BUMP_TYPE=${{ github.event.inputs.version_bump }}
          
          # 1. Bump root version without tagging
          npm version $BUMP_TYPE --no-git-tag-version
          
          # 2. Get the new version string
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # 3. Force sync all workspaces to this exact version
          npm version $NEW_VERSION --workspaces --no-git-tag-version
          
          # 4. Commit all version changes
          git add .
          git commit -m "chore: release v$NEW_VERSION"
          
          # 5. Create the tag on the new commit
          git tag v$NEW_VERSION

      - name: Push changes
        run: |
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create v${{ steps.bump.outputs.new_version }} \
            --title "v${{ steps.bump.outputs.new_version }}" \
            --generate-notes
